server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/mime.types;


    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml font/woff2;
    gzip_min_length 256;

    # Security Headers (applied to all responses not overridden by a location block)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; connect-src 'self'; frame-ancestors 'none';" always;

    # Clean URLs: try matches directly, then fall back to directory indexes
    location / {
        try_files $uri $uri/ =404;
    }

    # Static assets: long cache + CORS + security headers
    # NOTE: add_header in a location block replaces parent-level add_header, so
    # security headers must be repeated here to remain active on these responses.
    location ~* \.(?:css|js|woff2|woff|png|jpg|jpeg|gif|ico|svg|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    # No cache for XML feeds, sitemaps, and JSON metrics
    location ~* \.(?:html|xml|json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; connect-src 'self'; frame-ancestors 'none';" always;
    }
}
